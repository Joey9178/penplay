
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥特曼笔大战 - 双人对战版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            color: #e94560;
            font-size: 32px;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 900px;
            margin-bottom: 10px;
        }
        .player-panel {
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            border: 2px solid;
        }
        .player1 { border-color: #e74c3c; }
        .player2 { border-color: #3498db; }
        .player1.active { background: rgba(231, 76, 60, 0.3); box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
        .player2.active { background: rgba(52, 152, 219, 0.3); box-shadow: 0 0 20px rgba(52, 152, 219, 0.5); }
        .score { font-size: 24px; font-weight: bold; }
        #gameCanvas {
            border: 3px solid #e94560;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border-radius: 25px;
            font-family: 'Microsoft YaHei', sans-serif;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .tips {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .win-screen, .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        .hidden { display: none !important; }
        .win-screen h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .win-screen.p1-wins h2 { color: #e74c3c; }
        .win-screen.p2-wins h2 { color: #3498db; }
        .win-screen.draw h2 { color: #f39c12; }
        .start-screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }
        .instructions {
            max-width: 600px;
            text-align: center;
            margin: 20px 0;
            line-height: 1.8;
            color: #ccc;
            font-size: 16px;
        }
        .skill-list {
            text-align: left;
            margin: 20px auto;
            max-width: 500px;
        }
        .skill-list li {
            margin: 8px 0;
            color: #ffd700;
        }
        .start-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            padding: 20px 60px;
            font-size: 28px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>🖊️ 奥特曼笔大战 🖊️</h1>
    
    <div class="game-info">
        <div class="player-panel player1" id="player1Panel">
            <div>🔴 玩家1（红笔）</div>
            <div>胜利: <span class="score" id="score1">0</span> 局</div>
        </div>
        <div class="player-panel player2" id="player2Panel">
            <div>🔵 玩家2（蓝笔）</div>
            <div>胜利: <span class="score" id="score2">0</span> 局</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div class="controls">
        <button onclick="restartRound()">重新回合 🔄</button>
        <button onclick="newGame()">新游戏 🎮</button>
    </div>
    
    <div class="tips" id="tips">
        点击自己颜色的笔并拖动来瞄准，松开发射！
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🖊️ 奥特曼笔大战 🖊️</h1>
        <div class="instructions">
            <p><strong>游戏规则</strong></p>
            <ul class="skill-list">
                <li>🎯 目标：把对方的笔弹下桌子！</li>
                <li>👆 点击自己颜色的笔并拖动来瞄准</li>
                <li>🚀 松开鼠标将笔弹出去</li>
                <li>🔄 一人弹一次，轮流进行</li>
                <li>💀 谁的笔先掉下桌子，谁输！</li>
            </ul>
            <p><strong>招式技巧</strong></p>
            <ul class="skill-list">
                <li>🐉 神龙摆尾：直接弹笔尾，正面撞击！</li>
                <li>🦅 歪头杀：斜着弹，横向挑飞对方！</li>
                <li>💥 冲撞：近距离用力弹，直接撞飞！</li>
            </ul>
        </div>
        <button class="start-btn" onclick="startGame()">开始对战！</button>
    </div>

    <div class="win-screen hidden" id="winScreen">
        <h2 id="winText">玩家1胜利！</h2>
        <p id="winDetail" style="font-size: 20px; margin-bottom: 30px;"></p>
        <button onclick="nextRound()" style="background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);">下一局</button>
        <button onclick="newGame()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-left: 10px;">返回主菜单</button>
    </div>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        
        var currentPlayer = 1;
        var score1 = 0;
        var score2 = 0;
        var gameRunning = false;
        var isDragging = false;
        var dragStartX = 0;
        var dragStartY = 0;
        var draggedPen = null;
        var pens = [];
        
        // 修复后的物理参数 - 桌面版的弹笔物理
        var TABLE_Y = 420;        // 桌面底部位置（笔会掉下去的地方）
        var TABLE_TOP = 80;       // 桌面上边缘
        var TABLE_LEFT = 30;      // 桌面左边缘
        var TABLE_RIGHT = 870;    // 桌面右边缘
        
        // 物理参数 - 模拟桌面滑行效果
        var FRICTION = 0.992;     // 地面摩擦力
        var BOUNCE = 0.7;         // 弹性系数
        var ROTATION_DECAY = 0.99; // 旋转衰减
        
        function Pen(x, y, angle, player) {
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = 0;
            this.angle = angle;
            this.angularVel = 0;
            this.length = 100;
            this.width = 12;
            this.player = player;
            this.launched = false;
            this.fell = false;
            this.onTable = true;
        }
        
        Pen.prototype.update = function() {
            if (this.fell) return;
            
            // 如果在桌上，应用摩擦力滑行
            if (this.onTable) {
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                this.angle += this.angularVel;
                this.angularVel *= ROTATION_DECAY;
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界碰撞 - 左右墙壁
                var halfLen = this.length / 2;
                if (this.x - halfLen < TABLE_LEFT) {
                    this.x = TABLE_LEFT + halfLen;
                    this.vx = -this.vx * BOUNCE;
                    this.angularVel += this.vy * 0.01;
                }
                if (this.x + halfLen > TABLE_RIGHT) {
                    this.x = TABLE_RIGHT - halfLen;
                    this.vx = -this.vx * BOUNCE;
                    this.angularVel -= this.vy * 0.01;
                }
                
                // 上下边界
                if (this.y - 20 < TABLE_TOP) {
                    this.y = TABLE_TOP + 20;
                    this.vy = -this.vy * BOUNCE;
                }
                if (this.y + 20 > TABLE_Y) {
                    this.y = TABLE_Y - 20;
                    this.vy = -this.vy * BOUNCE;
                    this.vx *= 0.95; // 额外摩擦
                }
                
                // 检查是否停下来了
                var speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < 0.1) {
                    this.vx = 0;
                    this.vy = 0;
                }
            }
        };
        
        Pen.prototype.launch = function(vx, vy) {
            this.vx = vx;
            this.vy = vy;
            this.angularVel = (Math.random() - 0.5) * 0.15;
            this.launched = true;
            this.onTable = true;
        };
        
        Pen.prototype.draw = function() {
            if (this.fell) return;
            
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            var halfLen = this.length / 2;
            var halfWidth = this.width / 2;
            
            // 笔身
            var gradient = ctx.createLinearGradient(-halfLen, 0, halfLen, 0);
            if (this.player === 1) {
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#e74c3c');
                gradient.addColorStop(1, '#c0392b');
            } else {
                gradient.addColorStop(0, '#74b9ff');
                gradient.addColorStop(0.5, '#3498db');
                gradient.addColorStop(1, '#2980b9');
            }
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(-halfLen, -halfWidth, this.length, this.width, 5);
            ctx.fill();
            
            // 笔帽
            ctx.fillStyle = this.player === 1 ? '#f39c12' : '#9b59b6';
            ctx.beginPath();
            ctx.roundRect(-halfLen - 15, -halfWidth - 1, 17, this.width + 2, 3);
            ctx.fill();
            
            // 笔尖
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.moveTo(halfLen, -halfWidth/2);
            ctx.lineTo(halfLen + 15, 0);
            ctx.lineTo(halfLen, halfWidth/2);
            ctx.closePath();
            ctx.fill();
            
            // 文字
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('奥特曼', 0, 0);
            
            ctx.restore();
            
            // 当前玩家指示器
            if (this.player === currentPlayer && !this.launched && gameRunning) {
                ctx.save();
                ctx.strokeStyle = this.player === 1 ? '#e74c3c' : '#3498db';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(this.x, this.y, 35, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        };
        
        Pen.prototype.isPointInside = function(px, py) {
            var dx = px - this.x;
            var dy = py - this.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            return dist < this.length / 2 + 30;
        };
        
        Pen.prototype.checkFall = function() {
            // 检测笔是否掉出桌面
            if (this.y > TABLE_Y + 50 || this.y < TABLE_TOP - 50 || 
                this.x < TABLE_LEFT - 50 || this.x > TABLE_RIGHT + 50) {
                this.fell = true;
            }
        };
        
        function checkCollision() {
            if (!pens[0].launched || !pens[1].launched) return;
            if (pens[0].fell || pens[1].fell) return;
            
            var p1 = pens[0];
            var p2 = pens[1];
            
            var dx = p2.x - p1.x;
            var dy = p2.y - p1.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            
            var collisionDist = (p1.length + p2.length) / 2 - 20;
            
            if (dist < collisionDist && dist > 0) {
                var nx = dx / dist;
                var ny = dy / dist;
                
                var dvx = p1.vx - p2.vx;
                var dvy = p1.vy - p2.vy;
                var dvn = dvx * nx + dvy * ny;
                
                if (dvn > 0) {
                    var impulse = dvn * 1.3;
                    
                    p1.vx -= impulse * nx;
                    p1.vy -= impulse * ny;
                    p2.vx += impulse * nx;
                    p2.vy += impulse * ny;
                    
                    var overlap = collisionDist - dist;
                    p1.x -= overlap * nx * 0.8;
                    p1.y -= overlap * ny * 0.8;
                    p2.x += overlap * nx * 0.8;
                    p2.y += overlap * ny * 0.8;
                    
                    p1.angularVel += (Math.random() - 0.5) * 0.3;
                    p2.angularVel += (Math.random() - 0.5) * 0.3;
                }
            }
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            newGame();
        }
        
        function newGame() {
            score1 = 0;
            score2 = 0;
            document.getElementById('winScreen').classList.add('hidden');
            initGame();
            gameLoop();
        }
        
        function restartRound() {
            document.getElementById('winScreen').classList.add('hidden');
            initGame();
        }
        
        function nextRound() {
            document.getElementById('winScreen').classList.add('hidden');
            initGame();
        }
        
        function initGame() {
            pens = [
                new Pen(380, 250, 0, 1),
                new Pen(520, 250, 0, 2)
            ];
            currentPlayer = 1;
            gameRunning = true;
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
            
            var panel1 = document.getElementById('player1Panel');
            var panel2 = document.getElementById('player2Panel');
            
            panel1.className = 'player-panel player1' + (currentPlayer === 1 && gameRunning ? ' active' : '');
            panel2.className = 'player-panel player2' + (currentPlayer === 2 && gameRunning ? ' active' : '');
            
            var tips = document.getElementById('tips');
            if (gameRunning) {
                tips.textContent = '🔴 玩家' + currentPlayer + '（' + (currentPlayer === 1 ? '红笔' : '蓝笔') + '）回合 - 点击自己的笔并拖动来瞄准！';
            } else {
                tips.textContent = '游戏结束，点击按钮开始新游戏';
            }
        }
        
        function checkWin() {
            pens[0].checkFall();
            pens[1].checkFall();
            
            var p1Fell = pens[0].fell;
            var p2Fell = pens[1].fell;
            
            if (p1Fell || p2Fell) {
                gameRunning = false;
                
                var winScreen = document.getElementById('winScreen');
                var winText = document.getElementById('winText');
                var winDetail = document.getElementById('winDetail');
                
                if (p1Fell && p2Fell) {
                    winScreen.className = 'win-screen draw';
                    winText.textContent = '💥 同归于尽！💥';
                    winDetail.textContent = '这一局不算，重新来！';
                } else if (p1Fell) {
                    score2++;
                    winScreen.className = 'win-screen p2-wins';
                    winText.textContent = '🔵 玩家2胜利！🔵';
                    winDetail.textContent = '红笔掉下桌子，蓝笔获胜！';
                } else {
                    score1++;
                    winScreen.className = 'win-screen p1-wins';
                    winText.textContent = '🔴 玩家1胜利！🔴';
                    winDetail.textContent = '蓝笔掉下桌子，红笔获胜！';
                }
                
                updateUI();
                
                setTimeout(function() {
                    winScreen.classList.remove('hidden');
                }, 500);
            }
        }
        
        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }
        
        function checkStopped() {
            if (!gameRunning) return;
            
            var currentPen = pens[currentPlayer - 1];
            
            if (currentPen.launched) {
                var speed = Math.sqrt(currentPen.vx * currentPen.vx + currentPen.vy * currentPen.vy);
                
                if (speed < 0.15) {
                    setTimeout(function() {
                        if (gameRunning && !pens[0].fell && !pens[1].fell) {
                            switchPlayer();
                        }
                    }, 600);
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制桌面
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(TABLE_LEFT, TABLE_TOP, TABLE_RIGHT - TABLE_LEFT, TABLE_Y - TABLE_TOP);
            
            // 桌面边框
            ctx.strokeStyle = '#4a7c59';
            ctx.lineWidth = 6;
            ctx.strokeRect(TABLE_LEFT, TABLE_TOP, TABLE_RIGHT - TABLE_LEFT, TABLE_Y - TABLE_TOP);
            
            // 中心线
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, TABLE_TOP);
            ctx.lineTo(canvas.width / 2, TABLE_Y);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制笔
            for (var i = 0; i < pens.length; i++) {
                pens[i].draw();
            }
            
            // 绘制拖拽线
            if (isDragging && draggedPen && !draggedPen.launched) {
                ctx.strokeStyle = currentPlayer === 1 ? '#e74c3c' : '#3498db';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]);
                ctx.beginPath();
                ctx.moveTo(draggedPen.x, draggedPen.y);
                ctx.lineTo(dragStartX, dragStartY);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 箭头
                var dx = draggedPen.x - dragStartX;
                var dy = draggedPen.y - dragStartY;
                var len = Math.sqrt(dx * dx + dy * dy);
                if (len > 20) {
                    var angle = Math.atan2(dy, dx);
                    ctx.fillStyle = currentPlayer === 1 ? '#e74c3c' : '#3498db';
                    ctx.beginPath();
                    ctx.moveTo(draggedPen.x, draggedPen.y);
                    ctx.lineTo(
                        draggedPen.x - 25 * Math.cos(angle - Math.PI/6),
                        draggedPen.y - 25 * Math.sin(angle - Math.PI/6)
                    );
                    ctx.lineTo(
                        draggedPen.x - 25 * Math.cos(angle + Math.PI/6),
                        draggedPen.y - 25 * Math.sin(angle + Math.PI/6)
                    );
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }
        
        function update() {
            for (var i = 0; i < pens.length; i++) {
                pens[i].update();
            }
            checkCollision();
            checkWin();
            checkStopped();
        }
        
        function gameLoop() {
            if (gameRunning) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 事件处理
        canvas.addEventListener('mousedown', function(e) {
            if (!gameRunning) return;
            
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            
            var currentPen = pens[currentPlayer - 1];
            
            if (!currentPen.launched && currentPen.isPointInside(x, y)) {
                isDragging = true;
                draggedPen = currentPen;
                dragStartX = x;
                dragStartY = y;
            }
        });
        
        canvas.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            var rect = canvas.getBoundingClientRect();
            dragStartX = e.clientX - rect.left;
            dragStartY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mouseup', function(e) {
            if (!isDragging || !draggedPen) return;
            
            var dx = draggedPen.x - dragStartX;
            var dy = draggedPen.y - dragStartY;
            
            var force = Math.sqrt(dx * dx + dy * dy);
            var maxForce = 25;
            
            if (force > maxForce) {
                force = maxForce;
            }
            
            if (force > 3) {
                var ratio = force / Math.sqrt(dx * dx + dy * dy);
                var vx = dx * ratio * 0.25;
                var vy = dy * ratio * 0.25;
                
                draggedPen.launch(vx, vy);
            }
            
            isDragging = false;
            draggedPen = null;
        });
        
        canvas.addEventListener('mouseleave', function() {
            isDragging = false;
            draggedPen = null;
        });
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
